<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo – Cartones 28,25</title>
<style>
* {box-sizing:border-box;margin:0;padding:0;}
body {font-family:'Arial Rounded MT Bold','Helvetica Neue',Arial,sans-serif;font-weight:900;background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 10px 70px;}
h1 {color:#ff69b4;font-size:clamp(3.5rem,14vw,6rem);letter-spacing:10px;text-shadow:0 0 40px #ff69b488,0 5px 0 #99003366;margin-bottom:6px;line-height:1;}
.nav-wrap {display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;width:100%;max-width:420px;}
.nav-arrow {background:#1a1a1a;border:3px solid #ff69b455;color:#ff69b4;font-size:2rem;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.nav-arrow.disabled {opacity:0.25;pointer-events:none;}
.carton-badge {background:#ffffff;color:#330022;font-size:1.3rem;padding:8px 22px;border-radius:30px;letter-spacing:1px;text-align:center;flex:1;}
.dots {display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.dot {width:12px;height:12px;border-radius:50%;background:#1a1a1a;border:2px solid #ff69b444;cursor:pointer;transition:background 0.2s,transform 0.2s;}
.dot.active {background:#ff69b4;transform:scale(1.3);}
.status-box {width:100%;max-width:420px;margin-bottom:14px;min-height:74px;display:flex;align-items:center;justify-content:center;}
.status-normal {color:#ffb3d9;font-size:1.15rem;letter-spacing:1px;text-align:center;}
.status-almost {background:#ff00cc;border-radius:18px;padding:16px 20px;text-align:center;width:100%;box-shadow:0 0 40px #ff00cc99;animation:flashIn 0.3s ease;}
@keyframes flashIn {0%{transform:scale(0.88);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
.status-almost-main {font-size:clamp(1.9rem,7vw,2.6rem);color:#fff;line-height:1.1;}
.status-almost-sub {font-size:clamp(1rem,3.5vw,1.2rem);color:#ffffffdd;margin-top:5px;}
.card-wrap {background:linear-gradient(145deg,#1a001a,#0a0a0a);border-radius:22px;padding:14px;box-shadow:0 20px 70px #000b,0 0 0 5px #ff69b433;width:100%;max-width:420px;margin-bottom:16px;}
.header-row {display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px;}
.col-letter {font-size:clamp(2rem,7vw,2.8rem);color:#ff69b4;text-align:center;text-shadow:0 2px 6px #00000088;}
.grid {display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.cell {aspect-ratio:1;background:#ff69b4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(1.4rem,5.5vw,2rem);color:#1a0010;cursor:pointer;user-select:none;border:3px solid #ffffff22;box-shadow:inset 0 -5px 0 #0006,0 4px 10px #0005;-webkit-tap-highlight-color:transparent;transition:transform 0.15s,background 0.3s;}
.cell:active {transform:scale(0.91);}
.cell.marked {background:#2a0020;color:#ff69b4;box-shadow:0 0 18px #ff69b433,inset 0 -3px 0 #00000055;border-color:#ff69b444;animation:pop 0.35s ease;}
.cell.almost:not(.marked) {background:#ff00cc;color:#fff;box-shadow:0 0 32px #ff00cc99,inset 0 -5px 0 #00000033;border-color:#ff00ccaa;animation:pulseHot 0.9s ease-in-out infinite;}
.cell.winner {background:#ff69b4 !important;color:#fff !important;border-color:#ff69b4aa !important;box-shadow:0 0 36px #ff69b499 !important;animation:pulseWin 0.7s ease-in-out infinite !important;}
.cell.free {cursor:default;}
@keyframes pulseHot {0%,100%{transform:scale(1);}50%{transform:scale(1.16);}}
@keyframes pulseWin {0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
@keyframes pop {0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.btn-reset {background:#1a1a1a;color:#ff69b4;font-family:'Arial Rounded MT Bold',Arial,sans-serif;font-size:clamp(1.1rem,4vw,1.4rem);border:3px solid #ff69b444;border-radius:60px;padding:16px;cursor:pointer;width:100%;max-width:420px;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.btn-fullcard {background:#1a1a1a;color:#ffb3d9;font-family:'Arial Rounded MT Bold',Arial,sans-serif;font-size:clamp(1.1rem,4vw,1.4rem);border:3px solid #ff69b433;border-radius:60px;padding:16px;cursor:pointer;width:100%;max-width:420px;margin-bottom:20px;-webkit-tap-highlight-color:transparent;transition:all 0.2s;}
.btn-fullcard.active {background:#2a0020;color:#ff69b4;border-color:#ff69b4;box-shadow:0 0 20px #ff69b444;}
.modal-overlay {display:none;position:fixed;inset:0;background:#000000ee;z-index:100;align-items:center;justify-content:center;padding:14px;overflow-y:auto;}
.modal-overlay.show {display:flex;}
.modal {background:linear-gradient(160deg,#2a0030,#0a0a0a);border:5px solid #ff69b4;border-radius:30px;padding:30px 20px 28px;text-align:center;box-shadow:0 0 100px #ff69b488;animation:zoomIn 0.45s cubic-bezier(.175,.885,.32,1.275);width:100%;max-width:380px;margin:auto;}
@keyframes zoomIn {from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-bingo-title {font-size:clamp(4rem,16vw,6rem);color:#ff69b4;text-shadow:0 0 50px #ff69b4cc;line-height:1;animation:bounce 0.5s ease infinite alternate;margin-bottom:6px;}
@keyframes bounce {from{transform:scale(1);}to{transform:scale(1.1);}}
.modal-win-type {font-size:clamp(1.4rem,5vw,1.9rem);color:#ff69b4;margin-bottom:14px;line-height:1.2;}
.win-shape-section {margin-bottom:16px;}
.win-shape-label,.winning-nums-label {color:#ff69b4aa;font-size:clamp(0.9rem,3vw,1rem);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.win-shape-grid {display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:200px;margin:0 auto;}
.ws-cell {aspect-ratio:1;border-radius:50%;background:#1a1a1a;border:2px solid #33333366;}
.ws-cell.wh {background:#ff69b4;border-color:#ff69b4aa;}
.ws-cell.wf {background:#ff00cc;border-color:#ff00ccaa;}
.winning-nums-label {margin-bottom:10px;}
.winning-nums {display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;}
.win-num {font-size:clamp(1rem,4vw,1.3rem);background:#ff69b4;color:#ffffff;border-radius:50%;width:clamp(54px,14vw,64px);height:clamp(54px,14vw,64px);display:flex;align-items:center;justify-content:center;line-height:1.1;text-align:center;white-space:pre;padding:2px;animation:popIn 0.4s ease backwards;box-shadow:0 0 18px #ff69b466;}
@keyframes popIn {from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-verify {color:#ffffffaa;font-size:clamp(0.9rem,3vw,1.05rem);margin-bottom:22px;line-height:1.6;padding:0 4px;}
.btn-call {background:#ff69b4;color:#fff;font-family:'Arial Rounded MT Bold',Arial,sans-serif;font-size:clamp(1.5rem,6vw,2rem);border:none;border-radius:60px;padding:18px 28px;cursor:pointer;box-shadow:0 8px 0 #99003366;-webkit-tap-highlight-color:transparent;}
.btn-call:active {transform:translateY(4px);box-shadow:0 4px 0 #99003366;}
</style>
</head>
<body>
<h1>BINGO</h1>
<div class="nav-wrap">
  <div class="nav-arrow" id="btnPrev" onclick="changeCard(-1)">◀</div>
  <div class="carton-badge" id="cartonBadge">Cartón</div>
  <div class="nav-arrow" id="btnNext" onclick="changeCard(1)">▶</div>
</div>
<div class="dots" id="dots"></div>
<div class="status-box" id="statusBox"><div class="status-normal">Toca los números para marcarlos 👆</div></div>
<div class="card-wrap">
  <div class="header-row">
    <div class="col-letter">B</div><div class="col-letter">I</div>
    <div class="col-letter">N</div><div class="col-letter">G</div><div class="col-letter">O</div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<button class="btn-reset" onclick="resetCurrentCard()">↺ Limpiar este cartón</button>
<button class="btn-fullcard" id="btnFullCard" onclick="toggleFullCardMode()">🃏 Jugar carta llena</button>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-bingo-title">🎉 ¡BINGO!</div>
    <div class="modal-win-type" id="winType"></div>
    <div class="win-shape-section"><div class="win-shape-label">Así quedó la figura:</div><div class="win-shape-grid" id="winShapeGrid"></div></div>
    <div class="winning-nums-label">Los números que ganaron:</div>
    <div class="winning-nums" id="winningNums"></div>
    <div class="modal-verify" id="modalVerify"></div>
    <button class="btn-call" onclick="closeModal()">✔ Ver cartón</button>
  </div>
</div>
<script>
  var CARTONS=[
    {"num":28,"card":[[3,23,34,50,69],[5,24,33,60,68],[8,29,null,49,64],[14,17,37,52,66],[12,18,38,53,67]]},
    {"num":25,"card":[[9,24,32,55,72],[13,21,39,49,68],[5,28,null,57,61],[7,20,43,59,70],[11,26,33,60,65]]}
  ];
  var PATTERNS=[{name:'Esquinas Interiores',emoji:'💎',desc:'las 4 fichas del centro interior',cells:[[1,1],[1,3],[3,1],[3,3]]},{name:'Rombo Central',emoji:'🔷',desc:'las 4 fichas en forma de rombo',cells:[[1,2],[2,1],[3,2],[2,3]]},{name:'4 Esquinas',emoji:'🔲',desc:'las 4 esquinas del cartón',cells:[[0,0],[0,4],[4,0],[4,4]]},{name:'Cruz de Bordes',emoji:'✚',desc:'las 4 fichas en los bordes en cruz',cells:[[0,2],[2,0],[4,2],[2,4]]},{name:'Diagonal ↘',emoji:'↘',desc:'diagonal arriba-izq a abajo-der',cells:[[0,0],[1,1],[2,2],[3,3],[4,4]]},{name:'Diagonal ↙',emoji:'↙',desc:'diagonal arriba-der a abajo-izq',cells:[[0,4],[1,3],[2,2],[3,1],[4,0]]},{name:'Fila 1',emoji:'→',desc:'fila de arriba completa',cells:[[0,0],[0,1],[0,2],[0,3],[0,4]]},{name:'Fila 2',emoji:'→',desc:'segunda fila completa',cells:[[1,0],[1,1],[1,2],[1,3],[1,4]]},{name:'Fila 3',emoji:'→',desc:'fila del medio completa',cells:[[2,0],[2,1],[2,2],[2,3],[2,4]]},{name:'Fila 4',emoji:'→',desc:'cuarta fila completa',cells:[[3,0],[3,1],[3,2],[3,3],[3,4]]},{name:'Fila 5',emoji:'→',desc:'fila de abajo completa',cells:[[4,0],[4,1],[4,2],[4,3],[4,4]]},{name:'Columna B',emoji:'↓',desc:'columna B completa',cells:[[0,0],[1,0],[2,0],[3,0],[4,0]]},{name:'Columna I',emoji:'↓',desc:'columna I completa',cells:[[0,1],[1,1],[2,1],[3,1],[4,1]]},{name:'Columna N',emoji:'↓',desc:'columna N completa',cells:[[0,2],[1,2],[2,2],[3,2],[4,2]]},{name:'Columna G',emoji:'↓',desc:'columna G completa',cells:[[0,3],[1,3],[2,3],[3,3],[4,3]]},{name:'Columna O',emoji:'↓',desc:'columna O completa',cells:[[0,4],[1,4],[2,4],[3,4],[4,4]]},{name:'Cuadrado ↖',emoji:'⬛',desc:'cuadrado esquina superior izquierda',cells:[[0,0],[0,1],[1,0],[1,1]]},{name:'Cuadrado ↗',emoji:'⬛',desc:'cuadrado esquina superior derecha',cells:[[0,3],[0,4],[1,3],[1,4]]},{name:'Cuadrado ↙',emoji:'⬛',desc:'cuadrado esquina inferior izquierda',cells:[[3,0],[3,1],[4,0],[4,1]]},{name:'Cuadrado ↘',emoji:'⬛',desc:'cuadrado esquina inferior derecha',cells:[[3,3],[3,4],[4,3],[4,4]]}];
  var currentIdx=0;
  var markedStates=CARTONS.map(function(c){return c.card.map(function(row){return row.map(function(n){return n===null;});});});
  var fullCardMode=CARTONS.map(function(){return false;});
  var wasAlmost=CARTONS.map(function(){return false;});
  function getLetter(n){if(n<=15)return'B';if(n<=30)return'I';if(n<=45)return'N';if(n<=60)return'G';return'O';}
  function buildDots(){var el=document.getElementById('dots');el.innerHTML='';CARTONS.forEach(function(c,i){var d=document.createElement('div');d.className='dot'+(i===currentIdx?' active':'');d.onclick=function(){goToCard(i);};el.appendChild(d);});}
  function goToCard(idx){currentIdx=idx;wasAlmost[currentIdx]=false;renderAll();}
  function changeCard(dir){var n=currentIdx+dir;if(n>=0&&n<CARTONS.length)goToCard(n);}
  function renderAll(){var c=CARTONS[currentIdx];document.getElementById('cartonBadge').textContent='Cartón No. '+c.num;document.getElementById('btnPrev').className='nav-arrow'+(currentIdx===0?' disabled':'');document.getElementById('btnNext').className='nav-arrow'+(currentIdx===CARTONS.length-1?' disabled':'');buildDots();updateFullCardBtn();renderGrid();check();}
  function toggleFullCardMode(){fullCardMode[currentIdx]=!fullCardMode[currentIdx];wasAlmost[currentIdx]=false;updateFullCardBtn();check();}
  function updateFullCardBtn(){var btn=document.getElementById('btnFullCard');if(fullCardMode[currentIdx]){btn.textContent='🃏 Carta llena: ACTIVO';btn.classList.add('active');}else{btn.textContent='🃏 Jugar carta llena';btn.classList.remove('active');}}
  function renderGrid(){var card=CARTONS[currentIdx].card;var marks=markedStates[currentIdx];var grid=document.getElementById('grid');grid.innerHTML='';for(var r=0;r<5;r++){for(var c=0;c<5;c++){var num=card[r][c];var cell=document.createElement('div');cell.className='cell';if(num===null){cell.classList.add('free','marked');cell.textContent='★';}else{cell.textContent=num;if(marks[r][c])cell.classList.add('marked');(function(row,col,el){el.onclick=function(){toggleCell(row,col,el);};})(r,c,cell);}grid.appendChild(cell);}}}
  function toggleCell(r,c,el){markedStates[currentIdx][r][c]=!markedStates[currentIdx][r][c];el.classList.toggle('marked');el.classList.remove('almost');check();}
  function speak(text,delay){if(!window.speechSynthesis)return;setTimeout(function(){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang='es-ES';u.rate=0.82;u.pitch=1.1;u.volume=1;window.speechSynthesis.speak(u);},delay||0);}
  function check(){
    var marks=markedStates[currentIdx];
    var cells=Array.from(document.getElementById('grid').children);
    cells.forEach(function(el){el.classList.remove('almost','winner');});
    var box=document.getElementById('statusBox');
    if(fullCardMode[currentIdx]){
      var total=marks.reduce(function(s,row){return s+row.filter(Boolean).length;},0);
      var remaining=25-total;
      if(remaining===0){
        cells.forEach(function(el){el.classList.add('winner');});
        var sg=document.getElementById('winShapeGrid');sg.innerHTML='';
        for(var i=0;i<25;i++){var d=document.createElement('div');d.className='ws-cell wh';sg.appendChild(d);}
        document.getElementById('winningNums').innerHTML='';
        document.getElementById('winType').textContent='🎊 ¡CARTA COMPLETA!';
        document.getElementById('modalVerify').innerHTML='<strong>¡Llenaste todo el cartón No. '+CARTONS[currentIdx].num+'!</strong>';
        document.getElementById('modal').classList.add('show');
        speak('¡Bingo! ¡Llenaste la carta completa número '+CARTONS[currentIdx].num+'!',800);
      }else if(remaining<=3){
        box.innerHTML='<div class="status-almost"><div class="status-almost-main">🚨 ¡FALTAN '+remaining+'!</div><div class="status-almost-sub">Modo carta llena</div></div>';
        if(!wasAlmost[currentIdx]){speak('¡Faltan solo '+remaining+'!',400);}
        wasAlmost[currentIdx]=true;
      }else{
        wasAlmost[currentIdx]=false;
        box.innerHTML='<div class="status-normal">🃏 Carta llena — faltan <strong>'+remaining+'</strong></div>';
      }
      return;
    }
    var wonIdx=null,minMissing=99;
    var almostCells={},almostNames=[];
    for(var pi=0;pi<PATTERNS.length;pi++){
      var pat=PATTERNS[pi],missing=[];
      for(var ci=0;ci<pat.cells.length;ci++){var rr=pat.cells[ci][0],cc=pat.cells[ci][1];if(!marks[rr][cc])missing.push(rr*5+cc);}
      if(missing.length===0){wonIdx=pi;break;}
      if(missing.length<minMissing)minMissing=missing.length;
      if(missing.length===1){almostCells[missing[0]]=true;almostNames.push(pat.name);}
    }
    if(wonIdx!==null){showBingo(wonIdx);return;}
    for(var key in almostCells){var idx=parseInt(key);if(cells[idx]&&!cells[idx].classList.contains('marked'))cells[idx].classList.add('almost');}
    if(almostNames.length>0){
      var ns=almostNames.length<=2?almostNames.join(' y '):almostNames.length+' patrones';
      box.innerHTML='<div class="status-almost"><div class="status-almost-main">🚨 ¡TE FALTA 1!</div><div class="status-almost-sub">'+ns+'</div></div>';
      if(!wasAlmost[currentIdx]){speak('¡Cuidado! ¡Te falta solo un número para ganar!',700);}
      wasAlmost[currentIdx]=true;
    }else if(minMissing===2){
      wasAlmost[currentIdx]=false;
      box.innerHTML='<div class="status-normal" style="color:#ffb3d9">⚡ ¡Solo te faltan 2!</div>';
    }else{
      wasAlmost[currentIdx]=false;
      box.innerHTML='<div class="status-normal">Toca los números para marcarlos 👆</div>';
    }
  }
  function showBingo(pi){
    var pat=PATTERNS[pi],card=CARTONS[currentIdx].card;
    var cells=Array.from(document.getElementById('grid').children);
    for(var i=0;i<pat.cells.length;i++)cells[pat.cells[i][0]*5+pat.cells[i][1]].classList.add('winner');
    var sg=document.getElementById('winShapeGrid');sg.innerHTML='';var ws={};
    for(var i=0;i<pat.cells.length;i++)ws[pat.cells[i][0]*5+pat.cells[i][1]]=true;
    for(var r=0;r<5;r++)for(var c=0;c<5;c++){var d=document.createElement('div');d.className='ws-cell'+(card[r][c]===null?' wf':'')+(ws[r*5+c]?' wh':'');sg.appendChild(d);}
    var nc=document.getElementById('winningNums');nc.innerHTML='';var numList=[];
    for(var i=0;i<pat.cells.length;i++){var r=pat.cells[i][0],c=pat.cells[i][1],n=card[r][c];var d=document.createElement('div');d.className='win-num';d.style.animationDelay=(i*0.1)+'s';if(n===null){d.textContent='★';numList.push('la estrella');}else{d.textContent=getLetter(n)+'\n'+n;numList.push(getLetter(n)+'-'+n);}nc.appendChild(d);}
    document.getElementById('winType').textContent=pat.emoji+' '+pat.name;
    document.getElementById('modalVerify').innerHTML='Ganaste con <strong>'+pat.desc+'</strong>.<br>Fichas: <strong>'+numList.join(', ')+'</strong>';
    document.getElementById('modal').classList.add('show');
    speak('¡Bingo! ¡Ganaste con el cartón '+CARTONS[currentIdx].num+'! '+pat.name+'. '+numList.join(', '),800);
  }
  function closeModal(){document.getElementById('modal').classList.remove('show');}
  function resetCurrentCard(){
    markedStates[currentIdx]=CARTONS[currentIdx].card.map(function(row){return row.map(function(n){return n===null;});});
    wasAlmost[currentIdx]=false;
    document.getElementById('modal').classList.remove('show');
    document.getElementById('statusBox').innerHTML='<div class="status-normal">Toca los números para marcarlos 👆</div>';
    renderGrid();
  }
  renderAll();
</script>
</body>
</html>
