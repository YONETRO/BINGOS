<title>Bingo Carton 14</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
/* Ocultar checkboxes */
input[type=checkbox] { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }

body { font-family:Arial,sans-serif; font-weight:bold; background:#e0f7f7; text-align:center; padding:14px 8px 40px; min-height:100vh; }
h1 { color:#00a0a0; font-size:52px; letter-spacing:8px; margin-bottom:8px; text-shadow:0 4px 0 #007070; }
.badge { display:inline-block; background:#00a0a0; color:white; font-size:20px; padding:10px 32px; border-radius:30px; margin-bottom:16px; }

.card-outer { background:white; border-radius:20px; padding:12px; max-width:380px; margin:0 auto 20px; border:4px solid #00a0a066; box-shadow:0 6px 24px #00a0a022; }
table { width:100%; border-collapse:separate; border-spacing:5px; }
th { color:#00a0a0; font-size:28px; padding:6px 0; width:20%; }
td { width:20%; padding:0; }

.ficha {
  display:table;
  width:16vw; height:16vw;
  max-width:60px; max-height:60px;
  min-width:42px; min-height:42px;
  border-radius:50%;
  background:#00a0a0; color:white;
  font-size:17px; font-weight:bold;
  margin:0 auto;
  border:2px solid #00cccc;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition: background 0.15s, color 0.15s;
}
.ficha span {
  display:table-cell;
  vertical-align:middle;
  text-align:center;
  line-height:1.1;
  pointer-events:none;
}
.ficha.libre {
  cursor:default;
  background:#b2ecec;
  color:#00a0a0;
  border:2px solid #00a0a066;
  font-size:22px;
}

/* Marcar fichas al hacer check */
#cb00:checked ~ .card-outer .ficha[for='cb00'] { background:white; color:#00a0a0; border:3px solid #00a0a0; }

/* Banner de BINGO */
.bingo-banner {
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,100,100,0.93);
  z-index:100;
  padding:40px 20px;
  text-align:center;
}
.bingo-banner-box {
  background:white;
  border:5px solid #00a0a0;
  border-radius:24px;
  padding:30px 20px;
  max-width:340px;
  margin:0 auto;
}
.bingo-titulo { font-size:72px; color:#00a0a0; line-height:1; margin-bottom:10px; }
.bingo-sub { font-size:22px; color:#007070; margin-bottom:20px; }
.bingo-instruccion { font-size:16px; color:#004444; line-height:1.6; margin-bottom:24px; }
.btn-cerrar-banner {
  display:inline-block;
  background:#00a0a0; color:white;
  border:none; border-radius:40px;
  padding:16px 32px; font-size:20px;
  font-weight:bold; font-family:Arial,sans-serif;
  text-decoration:none; cursor:pointer;
}

/* Patron names */
.pat-name { display:none; }

/* Hint de toque */
.hint { color:#007070; font-size:15px; margin-bottom:12px; }
